version: '3.8'

# ==========================================
# ZK-AuthaaS Simulation - Docker Swarm Compose
# ==========================================
# Usage (local or on EC2):
#   docker swarm init
#   docker compose build                           # builds all images with build: directives
#   docker stack deploy -c docker-compose.yml zk   # deploys the stack to Swarm
#
# Scale verifiers on the fly:
#   docker service scale zk_snark-verifier=50 zk_stark-verifier=50
#
# Tear down:
#   docker stack rm zk
#
# Notes:
# - `build:` is used by `docker compose build`. Swarm (`stack deploy`) ignores it
#   and pulls by `image:` tag, so we keep both.
# - `container_name:` is intentionally omitted - Swarm generates task names.
# - Swarm substitutes {{.Task.Slot}} into env vars (but NOT into command), so we
#   pass it via TASK_SLOT and the worker reads it from os.environ.

services:

  # ------------------------------------------
  # Shared Redis brokers (3 total, not 21)
  # ------------------------------------------
  proof-queue:
    image: redis:latest
    ports:
      - "6379:6379"
    deploy:
      replicas: 1
    networks:
      - zk-net

  snark-queue:
    image: redis:latest
    ports:
      - "6380:6379"
    deploy:
      replicas: 1
    networks:
      - zk-net

  stark-queue:
    image: redis:latest
    ports:
      - "6381:6379"
    deploy:
      replicas: 1
    networks:
      - zk-net

  # ------------------------------------------
  # Request Handler (FastAPI)
  # ------------------------------------------
  request-handler:
    build:
      context: .
      dockerfile: Dockerfile.requesthandler
    image: zk-authaas/request-handler:latest
    depends_on:
      - proof-queue
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "requestHandler.py", "--redis-host", "proof-queue", "--redis-port", "6379"]
    deploy:
      replicas: 1
    networks:
      - zk-net

  # ------------------------------------------
  # Verifier Selector
  # ------------------------------------------
  # IMPORTANT: keep --snark-count / --stark-count in sync with the
  # replicas counts of snark-verifier / stark-verifier below.
  verifier-selector:
    build:
      context: .
      dockerfile: Dockerfile.selector
    image: zk-authaas/verifier-selector:latest
    depends_on:
      - proof-queue
      - snark-queue
      - stark-queue
    environment:
      - PYTHONUNBUFFERED=1
    command:
      - "python"
      - "verifierSelector.py"
      - "--proof-host"
      - "proof-queue"
      - "--proof-port"
      - "6379"
      - "--snark-host"
      - "snark-queue"
      - "--snark-port"
      - "6379"
      - "--stark-host"
      - "stark-queue"
      - "--stark-port"
      - "6379"
      - "--snark-count"
      - "10"
      - "--stark-count"
      - "10"
      - "--routing"
      - "weighted"
      - "--snark-cost-weight"
      - "10.0"
      - "--stark-cost-weight"
      - "1.0"
    deploy:
      replicas: 1
    networks:
      - zk-net

  # ------------------------------------------
  # SNARK verifier pool - scale via deploy.replicas
  # ------------------------------------------
  snark-verifier:
    build:
      context: .
      dockerfile: Dockerfile.snark
    image: zk-authaas/snark-verifier:latest
    depends_on:
      - snark-queue
      - proof-queue
    environment:
      # Swarm substitutes the 1-based slot number into this env var;
      # the worker converts it to a 0-based index internally.
      - TASK_SLOT={{.Task.Slot}}
    command:
      - "node"
      - "SNARKVerifierWorker.js"
      - "--redis-host"
      - "snark-queue"
      - "--redis-port"
      - "6379"
      - "--proof-queue-host"
      - "proof-queue"
      - "--proof-queue-port"
      - "6379"
    deploy:
      replicas: 10
      resources:
        limits:
          cpus: '0.15'
          memory: 384M
    networks:
      - zk-net

  # ------------------------------------------
  # STARK verifier pool - scale via deploy.replicas
  # ------------------------------------------
  stark-verifier:
    build:
      context: .
      dockerfile: Dockerfile.stark
    image: zk-authaas/stark-verifier:latest
    depends_on:
      - stark-queue
      - proof-queue
    environment:
      - TASK_SLOT={{.Task.Slot}}
      - PYTHONUNBUFFERED=1
    command:
      - "python"
      - "STARKVerifierWorker.py"
      - "--redis-host"
      - "stark-queue"
      - "--redis-port"
      - "6379"
      - "--proof-queue-host"
      - "proof-queue"
      - "--proof-queue-port"
      - "6379"
    deploy:
      replicas: 10
      resources:
        limits:
          cpus: '0.15'
          memory: 200M
    networks:
      - zk-net

networks:
  zk-net:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 10.1.0.0/20   # 4094 usable IPs — supports 500+500 scale (default /24 only gives 254). Avoid 10.0.x.x which overlaps with Swarm's ingress network (10.0.0.0/24).
