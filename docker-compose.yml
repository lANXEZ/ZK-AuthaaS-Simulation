version: '3.8'
services:
  proof-queue:
    image: redis:latest
    container_name: proof-queue
    ports:
      - "6379:6379"
  request-handler:
    build:
      context: .
      dockerfile: Dockerfile.requesthandler
    container_name: request-handler
    depends_on:
      - proof-queue
    environment:
      - REDIS_HOST=proof-queue
      - REDIS_PORT=6379
    ports:
      - "8000:8000"
    command: ["python", "requestHandler.py", "--redis-host", "proof-queue", "--redis-port", "6379"]
  verifier-selector:
    build:
      context: .
      dockerfile: Dockerfile.selector
    container_name: verifier-selector
    depends_on:
      - proof-queue
      # Add all snark-queue-* and stark-queue-* services below as needed
      - snark-queue-1
      - snark-queue-2
      - snark-queue-3
      - snark-queue-4
      - snark-queue-5
      - snark-queue-6
      - snark-queue-7
      - snark-queue-8
      - snark-queue-9
      - snark-queue-10
      - stark-queue-1
      - stark-queue-2
      - stark-queue-3
      - stark-queue-4
      - stark-queue-5
      - stark-queue-6
      - stark-queue-7
      - stark-queue-8
      - stark-queue-9
      - stark-queue-10
    environment:
      - PROOF_HOST=proof-queue
      - PROOF_PORT=6379
    # Use --snark-count and --stark-count to control scaling
    command: ["python", "verifierSelector.py", "--proof-host", "proof-queue", "--proof-port", "6379", "--snark-count", "10", "--stark-count", "10"]
  # SNARK and STARK verifiers and queues
  # To scale, duplicate the following blocks and increment the numbers

# --- SNARK Queues and Verifiers ---
  snark-queue-1:
    image: redis:latest
    container_name: snark-queue-1
    ports:
      - "6380:6379"
  snark-verifier-1:
    build:
      context: .
      dockerfile: Dockerfile.snark
    container_name: snark-verifier-1
    depends_on:
      - snark-queue-1
    environment:
      - REDIS_HOST=snark-queue-1
      - REDIS_PORT=6379
    command: ["python", "SNARKVerifierWorker.py", "--redis-host", "snark-queue-1", "--redis-port", "6379", "--index", "0", "--proof-queue-host", "proof-queue", "--proof-queue-port", "6379"]
